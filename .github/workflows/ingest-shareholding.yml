name: Ingest shareholding (BSE)

# Pulls quarterly shareholding patterns from BSE for the watch universe.
# Companies file shareholding within ~30 days of quarter end, so this
# runs weekly on Saturday to catch any newly filed quarters.
#
# Universe tiers (configurable via workflow_dispatch input or
# HOLDINGDASH_UNIVERSE env var):
#   NIFTY50   ~50 companies × 20 quarters ≈ 7 min
#   NIFTY100  ~100 × 20 ≈ 15 min
#   NIFTY200  ~200 × 20 ≈ 27 min
#   NIFTY500  ~500 × 20 ≈ 67 min   (default — fits comfortably in 90 min budget)
#   ALL       ~2000 × 20 ≈ 4.5 hr  (overflows; run via parallel matrix later)
on:
  schedule:
    - cron: '0 4 * * 6'  # Sat 04:00 UTC
  workflow_dispatch:
    inputs:
      universe:
        description: 'NIFTY50 | NIFTY100 | NIFTY200 | NIFTY500 | ALL | comma-list'
        required: false
        default: 'NIFTY500'
      quarters:
        description: 'Quarter-ends to pull (default 20 = 5 years)'
        required: false
        default: '20'

permissions:
  contents: write

concurrency:
  group: ingest-shareholding
  cancel-in-progress: false

jobs:
  shareholding:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      OUT_DIR: ${{ github.workspace }}/data-out
      HOLDINGDASH_UNIVERSE: ${{ inputs.universe || 'NIFTY500' }}
      BSE_PROXY_URL: ${{ secrets.BSE_PROXY_URL }}
      BSE_PROXY_SECRET: ${{ secrets.BSE_PROXY_SECRET }}
    steps:
      - name: Checkout source (main)
        uses: actions/checkout@v4
        with:
          path: source
          ref: main

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          path: data-out
          ref: data
          fetch-depth: 1
        continue-on-error: true

      - name: Init data branch if missing
        run: |
          if [ ! -d "${{ github.workspace }}/data-out/.git" ]; then
            mkdir -p "${{ github.workspace }}/data-out"
            cd "${{ github.workspace }}/data-out"
            git init -b data
            git remote add origin "https://github.com/${{ github.repository }}.git"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: source/ingestion/requirements.txt

      - name: Install deps
        working-directory: source
        run: pip install -r ingestion/requirements.txt

      - name: Refresh BSE master + NSE→BSE map
        working-directory: source
        run: python -u -m ingestion.scripts.fetch_bse_master
        continue-on-error: true

      - name: Fetch shareholding from Screener (primary)
        working-directory: source
        run: |
          python -u -m ingestion.scripts.fetch_screener_shareholding \
            --symbols "${HOLDINGDASH_UNIVERSE}" \
            --delay 1.0
        continue-on-error: true

      - name: Fetch shareholding from BSE (fallback for top holders)
        working-directory: source
        run: |
          python -u -m ingestion.scripts.fetch_shareholding \
            --symbols "${HOLDINGDASH_UNIVERSE}" \
            --quarters ${{ inputs.quarters || 20 }}
        continue-on-error: true

      - name: Aggregate per-ticker rollups (quarterly + yearly)
        working-directory: source
        run: python -u -m ingestion.scripts.aggregate_per_ticker
        continue-on-error: true

      - name: Commit + push
        working-directory: data-out
        run: |
          set -e
          git config user.name "holdingdash-bot"
          git config user.email "bot@holdingdash.local"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          STAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          git add -A
          git commit -m "Shareholding refresh @ $STAMP [skip ci]"
          git push origin HEAD:data
