name: Ingest shareholding (BSE)

# Pulls quarterly shareholding patterns from BSE for the watch universe.
# Companies file shareholding within 45 days of quarter end, so this
# runs weekly on Saturday to catch any newly filed quarters.
on:
  schedule:
    - cron: '0 4 * * 6'  # Sat 04:00 UTC
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Comma-separated NSE symbols (default NIFTY 50)'
        required: false
        default: ''
      quarters:
        description: 'Quarter-ends to pull (default 8)'
        required: false
        default: '8'

permissions:
  contents: write

concurrency:
  group: ingest-shareholding
  cancel-in-progress: false

jobs:
  shareholding:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OUT_DIR: ${{ github.workspace }}/data-out
    steps:
      - name: Checkout source (main)
        uses: actions/checkout@v4
        with:
          path: source
          ref: main

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          path: data-out
          ref: data
          fetch-depth: 1
        continue-on-error: true

      - name: Init data branch if missing
        run: |
          if [ ! -d "${{ github.workspace }}/data-out/.git" ]; then
            mkdir -p "${{ github.workspace }}/data-out"
            cd "${{ github.workspace }}/data-out"
            git init -b data
            git remote add origin "https://github.com/${{ github.repository }}.git"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: source/ingestion/requirements.txt

      - name: Install deps
        working-directory: source
        run: pip install -r ingestion/requirements.txt

      - name: Refresh BSE master + NSE→BSE map
        working-directory: source
        run: python -m ingestion.scripts.fetch_bse_master

      - name: Fetch shareholding patterns
        working-directory: source
        run: |
          if [ -n "${{ inputs.symbols }}" ]; then
            python -m ingestion.scripts.fetch_shareholding --symbols "${{ inputs.symbols }}" --quarters ${{ inputs.quarters }}
          else
            python -m ingestion.scripts.fetch_shareholding --quarters ${{ inputs.quarters }}
          fi

      - name: Aggregate per-ticker rollups
        working-directory: source
        run: python -m ingestion.scripts.aggregate_per_ticker

      - name: Commit + push
        working-directory: data-out
        run: |
          set -e
          git config user.name "holdingdash-bot"
          git config user.email "bot@holdingdash.local"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          STAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          git add -A
          git commit -m "Shareholding refresh @ $STAMP [skip ci]"
          git push origin HEAD:data
