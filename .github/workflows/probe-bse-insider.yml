name: Probe BSE insider (one-off)

# Manual / on-push probe — runs the BSE insider-API exploration script and
# prints findings to the job log. Writes nothing to the data branch. Path
# filter keeps it from re-running on unrelated dev commits.

on:
  workflow_dispatch:
  push:
    branches:
      - claude/holdingdash-development-jrcsp
    paths:
      - 'ingestion/scripts/probe_bse_insider.py'
      - '.github/workflows/probe-bse-insider.yml'

permissions:
  contents: write

concurrency:
  group: probe-bse-insider
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BSE_PROXY_URL: ${{ secrets.BSE_PROXY_URL }}
      BSE_PROXY_SECRET: ${{ secrets.BSE_PROXY_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/holdingdash-development-jrcsp
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Install deps
        run: pip install -r ingestion/requirements.txt

      - name: Probe
        run: python -u -m ingestion.scripts.probe_bse_insider

      - name: Commit findings back to dev branch
        run: |
          set -e
          git config user.name "holdingdash-bot"
          git config user.email "bot@holdingdash.local"
          if [ -z "$(git status --porcelain ingestion/debug/)" ]; then
            echo "No probe output to commit."
            exit 0
          fi
          STAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          git add ingestion/debug/
          git commit -m "Probe findings @ $STAMP"
          git push origin HEAD:claude/holdingdash-development-jrcsp
