name: Backfill bhavcopy (manual)

# One-shot backfill of the last N trading days of NSE bhavcopy. Run this once
# after first setting up the data branch so every ticker has price history.
# After this, the daily cron keeps things current.
on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Calendar days to backfill (default 90)'
        required: false
        default: '90'

permissions:
  contents: write

concurrency:
  group: backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OUT_DIR: ${{ github.workspace }}/data-out
    steps:
      - name: Checkout source (main)
        uses: actions/checkout@v4
        with:
          path: source
          ref: main

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          path: data-out
          ref: data
          fetch-depth: 1
        continue-on-error: true

      - name: Init data branch if missing
        run: |
          if [ ! -d "${{ github.workspace }}/data-out/.git" ]; then
            mkdir -p "${{ github.workspace }}/data-out"
            cd "${{ github.workspace }}/data-out"
            git init -b data
            git remote add origin "https://github.com/${{ github.repository }}.git"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: source/ingestion/requirements.txt

      - name: Install deps
        working-directory: source
        run: pip install -r ingestion/requirements.txt

      - name: Backfill bhavcopy
        working-directory: source
        run: python -m ingestion.scripts.backfill_bhavcopy --days ${{ inputs.days }}

      - name: Aggregate per-ticker rollups
        working-directory: source
        run: python -m ingestion.scripts.aggregate_per_ticker

      - name: Commit + push
        working-directory: data-out
        run: |
          set -e
          git config user.name "holdingdash-bot"
          git config user.email "bot@holdingdash.local"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          STAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          git add -A
          git commit -m "Bhavcopy backfill (${{ inputs.days }} days) @ $STAMP [skip ci]"
          git push origin HEAD:data
